<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopX Clone</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-purple: #615dfa;
            --dark-navy: #1d2149;
            --light-blue-bg: #eff3ff;
            --coral-red: #ff7575;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: #ffffff;
            color: var(--dark-navy);
            overflow-x: hidden;
        }

        /* --- Header --- */
        header {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            gap: 12px;
            background: #fff;
        }

        .logo {
            display: flex;
            align-items: center;
            font-size: 22px;
            font-weight: 800;
            color: var(--dark-navy);
            gap: 6px;
        }

        .logo i {
            color: var(--primary-purple);
            font-size: 24px;
        }

        .search-bar {
            flex: 1;
            display: flex;
            align-items: center;
            background: #f0f2f8;
            padding: 10px 15px;
            border-radius: 30px;
            gap: 10px;
        }

        .search-bar i { color: #9ca3af; font-size: 16px; }
        .search-bar input {
            border: none;
            background: transparent;
            outline: none;
            width: 100%;
            font-size: 14px;
            color: #6b7280;
        }

        .cart-icon {
            position: relative;
            font-size: 22px;
            color: #000;
        }

        .cart-count {
            position: absolute;
            top: -6px;
            right: -8px;
            background: #f97316;
            color: white;
            font-size: 10px;
            font-weight: bold;
            padding: 2px 5px;
            border-radius: 50%;
        }

        /* --- Hero Banner (The Super Deals Section) --- */
        .hero-section {
            padding: 15px;
        }

        .hero-card {
            background: var(--light-blue-bg);
            border-radius: 40px; /* High rounding as per image */
            padding: 60px 20px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .hero-card h1 {
            font-size: 44px;
            font-weight: 900; /* Extra bold */
            color: var(--dark-navy);
            line-height: 1.1;
            margin-bottom: 25px;
            letter-spacing: -1px;
        }

        .hero-card .discount {
            font-size: 52px;
            font-weight: 800;
            color: var(--coral-red);
            margin-bottom: 40px;
            line-height: 1;
        }

        .shop-now-btn {
            background: var(--primary-purple);
            color: white;
            padding: 16px 35px;
            border-radius: 35px;
            text-decoration: none;
            font-weight: 700;
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 10px 25px rgba(97, 93, 250, 0.4);
        }

        /* --- Categories --- */
        .categories-container {
            display: flex;
            gap: 20px;
            padding: 30px 15px;
            overflow-x: auto;
            scrollbar-width: none;
        }

        .cat-box {
            min-width: 85px;
            text-align: center;
        }

        .cat-circle {
            width: 75px;
            height: 75px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            margin: 0 auto 12px;
            color: var(--primary-purple);
            font-size: 26px;
            border: 1px solid #f8f8f8;
        }

        .cat-box span {
            font-size: 13px;
            font-weight: 600;
            color: #666;
        }

        /* --- Product Card --- */
        .product-section {
            padding: 10px 20px;
        }

        .product-card {
            border: 1px solid #f0f0f0;
            border-radius: 30px;
            padding: 25px;
            background: #fff;
            box-shadow: 0 4px 15px rgba(0,0,0,0.02);
        }

        .product-card h2 {
            font-size: 20px;
            font-weight: 800;
            color: var(--dark-navy);
            margin-bottom: 20px;
        }

        .img-placeholder {
            width: 100%;
            height: 140px;
            background: #f8fafc;
            border-radius: 20px;
        }

        /* Mobile specific adjustments */
        @media (max-width: 480px) {
            .hero-card h1 { font-size: 40px; }
            .hero-card .discount { font-size: 46px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">
            <i class="fas fa-shopping-basket"></i> ShopX
        </div>
        <div class="search-bar">
            <i class="fas fa-search"></i>
            <input type="text" placeholder="Search products...">
        </div>
        <div class="cart-icon">
            <i class="fas fa-shopping-cart"></i>
            <span class="cart-count">3</span>
        </div>
    </header>

    <section class="hero-section">
        <div class="hero-card">
            <h1>Super<br>Deals!</h1>
            <div class="discount">Up to 50% Off</div>
            <a href="#" class="shop-now-btn">
                Shop Now <i class="fas fa-arrow-right"></i>
            </a>
        </div>
    </section>

    <div class="categories-container">
        <div class="cat-box">
            <div class="cat-circle"><i class="fas fa-mobile-screen"></i></div>
            <span>Phones</span>
        </div>
        <div class="cat-box">
            <div class="cat-circle"><i class="fas fa-headphones"></i></div>
            <span>Headphones</span>
        </div>
        <div class="cat-box">
            <div class="cat-circle"><i class="fas fa-clock"></i></div>
            <span>Watches</span>
        </div>
        <div class="cat-box">
            <div class="cat-circle"><i class="fas fa-tshirt"></i></div>
            <span>Fashion</span>
        </div>
    </div>

    <section class="product-section">
        <div class="product-card">
            <h2>Smartphone Pro</h2>
            <div class="img-placeholder"></div>
        </div>
    </section>

</body>
</html>
