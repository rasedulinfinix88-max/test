<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Card Layout</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #ffffff; /* সাদা ব্যাকগ্রাউন্ড */
            padding: 20px;
        }

        .container {
            max-width: 400px; /* মোবাইল ভিউ এর জন্য */
            margin: 0 auto;
        }

        .heading {
            font-size: 24px;
            font-weight: bold;
            font-style: italic;
            text-transform: uppercase;
            border-bottom: 2px solid #333;
            display: inline-block;
            margin-bottom: 20px;
        }

        /* কার্ডের মূল অংশ */
        .card {
            background: #fff;
            border: 1px solid #eee;
            margin-bottom: 30px;
            position: relative;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        /* ডিসকাউন্ট ব্যাজ */
        .discount-badge {
            position: absolute;
            top: 0;
            right: 0;
            background: #ff4d4d;
            color: white;
            padding: 5px 15px;
            font-size: 14px;
            font-weight: bold;
            z-index: 1;
        }

        /* ইমেজ সেকশন */
        .image-placeholder {
            width: 100%;
            height: 250px;
            background-color: #fcfcfc;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #777;
        }

        /* ইনফো সেকশন */
        .info-box {
            background: #1a1c2c; /* ছবির মত গাঢ় নীল ব্যাকগ্রাউন্ড */
            color: white;
            padding: 15px;
        }

        .rating-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .stars {
            color: #ff9f43;
            font-size: 14px;
        }

        .review-count {
            color: #888;
            font-size: 12px;
        }

        .product-title {
            font-size: 18px;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 10px;
            display: block;
        }

        .price-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .current-price {
            color: #ffcc00; /* হলুদ প্রাইস */
            font-size: 22px;
            font-weight: bold;
        }

        .old-price {
            text-decoration: line-through;
            color: #666;
            font-size: 14px;
        }

        /* বাটন সেকশন */
        .btn-container {
            display: flex;
        }

        .btn {
            flex: 1;
            padding: 15px;
            border: none;
            text-transform: uppercase;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
        }

        .btn-cart {
            background-color: #f15a24; /* লাল/কমলা অ্যাড টু কার্ট */
            color: white;
        }

        .btn-details {
            background-color: #ffcc29; /* হলুদ ডিটেইলস বাটন */
            color: #000;
        }

    </style>
</head>
<body>

<div class="container">
    <h2 class="heading">OUR PRODUCTS</h2>

    <div class="card">
        <div class="discount-badge">21% OFF</div>
        <div class="image-placeholder">
            <span>[IMAGE HERE]</span>
        </div>
        <div class="info-box">
            <div class="rating-row">
                <span class="stars">★★★★☆</span>
                <span class="review-count">112 REVIEWS</span>
            </div>
            <span class="product-title">LUXURY LEATHER HANDBAG</span>
            <div class="price-row">
                <span class="current-price">TK. 95</span>
                <span class="old-price">TK. 120</span>
            </div>
        </div>
        <div class="btn-container">
            <button class="btn btn-cart">ADD TO CART</button>
            <button class="btn btn-details">DETAILS</button>
        </div>
    </div>

    <div class="card">
        <div class="discount-badge">18% OFF</div>
        <div class="image-placeholder">
            <span>[IMAGE HERE]</span>
        </div>
        <div class="info-box">
            <div class="rating-row">
                <span class="stars">★★★★☆</span>
                <span class="review-count">112 REVIEWS</span>
            </div>
            <span class="product-title">CLASSIC GOLD WATCH</span>
            <div class="price-row">
                <span class="current-price">TK. 180</span>
                <span class="old-price">TK. 220</span>
            </div>
        </div>
        <div class="btn-container">
            <button class="btn btn-cart">ADD TO CART</button>
            <button class="btn btn-details">DETAILS</button>
        </div>
    </div>
</div>

</body>
</html>
