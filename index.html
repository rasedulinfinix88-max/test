<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Shop Layout</title>
    <style>
        /* Global Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #ffffff; /* আপনার অনুরোধ অনুযায়ী সাদা ব্যাকগ্রাউন্ড */
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        h2 {
            font-style: italic;
            text-transform: uppercase;
            border-bottom: 2px solid #333;
            display: inline-block;
            margin-bottom: 25px;
            padding-bottom: 5px;
        }

        /* Product Grid */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
        }

        .product-card {
            background: #fff;
            border: 1px solid #eee;
            position: relative;
            overflow: hidden;
            transition: transform 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .product-card:hover {
            transform: translateY(-5px);
        }

        /* Badge/Discount */
        .badge {
            position: absolute;
            top: 0;
            right: 0;
            background: #ff4757;
            color: white;
            padding: 5px 12px;
            font-weight: bold;
            font-size: 14px;
            z-index: 10;
        }

        .product-image {
            width: 100%;
            height: 250px;
            background-color: #f9f9f9;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .product-image img {
            max-width: 100%;
            max-height: 100%;
            object-fit: cover;
        }

        /* Product Info */
        .product-info {
            padding: 15px;
            background: #1a1a2e; /* ইউনিক কালার: ডার্ক নেভি */
            color: white;
        }

        .rating {
            color: #ff9f43;
            font-size: 12px;
            margin-bottom: 5px;
        }

        .reviews {
            color: #999;
            font-size: 11px;
            float: right;
        }

        .product-name {
            font-size: 16px;
            font-weight: bold;
            text-transform: uppercase;
            margin: 10px 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .price-area {
            margin-bottom: 15px;
        }

        .current-price {
            color: #ffca28; /* গোল্ডেন/হলুদ টেক্সট */
            font-size: 20px;
            font-weight: bold;
            margin-right: 10px;
        }

        .old-price {
            text-decoration: line-through;
            color: #777;
            font-size: 14px;
        }

        /* Buttons Section */
        .button-group {
            display: flex;
            width: 100%;
        }

        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 12px;
            transition: 0.3s;
        }

        .btn-add {
            background-color: #e84118; /* আপনার অনুরোধ অনুযায়ী লাল বাটন */
            color: white;
        }

        .btn-add:hover {
            background-color: #c23616;
        }

        .btn-details {
            background-color: #fbc531; /* আপনার অনুরোধ অনুযায়ী হলুদ বাটন */
            color: #000;
        }

        .btn-details:hover {
            background-color: #e1b12c;
        }

    </style>
</head>
<body>

<div class="container">
    <h2>Our Products</h2>

    <div class="product-grid">
        <div class="product-card">
            <div class="badge">21% OFF</div>
            <div class="product-image">
                <img src="https://via.placeholder.com/300x300?text=Handbag" alt="Handbag">
            </div>
            <div class="product-info">
                <span class="reviews">112 REVIEWS</span>
                <div class="rating">★★★★☆</div>
                <div class="product-name">Luxury Leather Handbag</div>
                <div class="price-area">
                    <span class="current-price">TK. 95</span>
                    <span class="old-price">TK. 120</span>
                </div>
            </div>
            <div class="button-group">
                <button class="btn btn-add">Add To Cart</button>
                <button class="btn btn-details">Details</button>
            </div>
        </div>

        <div class="product-card">
            <div class="badge">18% OFF</div>
            <div class="product-image">
                <img src="https://via.placeholder.com/300x300?text=Watch" alt="Watch">
            </div>
            <div class="product-info">
                <span class="reviews">112 REVIEWS</span>
                <div class="rating">★★★★☆</div>
                <div class="product-name">Classic Gold Watch</div>
                <div class="price-area">
                    <span class="current-price">TK. 180</span>
                    <span class="old-price">TK. 220</span>
                </div>
            </div>
            <div class="button-group">
                <button class="btn btn-add">Add To Cart</button>
                <button class="btn btn-details">Details</button>
            </div>
        </div>
    </div>
</div>

</body>
</html>
