<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trendy Fashion BD</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-dark: #0a1120; /* Deep dark blue background */
            --card-bg: #111a2d; /* Slightly lighter card bg */
            --primary-gold: #f3c623; /* Golden color for accents */
            --text-white: #ffffff;
            --text-gray: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-white);
            padding: 10px;
        }

        /* --- Header --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            color: var(--primary-gold);
            font-size: 28px;
            font-weight: 800;
        }

        .logo-text h1 { font-size: 18px; font-weight: 700; }
        .logo-text p { font-size: 12px; color: var(--text-gray); }

        .header-icons {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .icon-btn {
            position: relative;
            font-size: 20px;
            color: var(--text-white);
        }

        .badge {
            position: absolute;
            top: -5px;
            right: -8px;
            background: var(--primary-gold);
            color: black;
            font-size: 10px;
            font-weight: bold;
            padding: 2px 5px;
            border-radius: 50%;
        }

        .user-avatar {
            width: 35px;
            height: 35px;
            background: #2563eb;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* --- Categories --- */
        .categories {
            display: flex;
            justify-content: space-around;
            padding: 20px 0;
        }

        .cat-item { text-align: center; }

        .cat-circle {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 2px solid var(--primary-gold);
            background: #fff; /* White background as in image */
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 8px;
            overflow: hidden;
        }

        .cat-circle i { font-size: 30px; color: #333; }
        .cat-item span { font-size: 12px; color: var(--text-gray); font-weight: 500; }

        /* --- Banner --- */
        .banner {
            width: 100%;
            height: 180px;
            background: #007bff;
            border-radius: 15px;
            margin: 10px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .banner img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.9;
        }

        /* --- Product Section --- */
        .section-title {
            font-size: 22px;
            font-weight: 700;
            margin: 20px 0 15px 5px;
        }

        .product-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .product-card {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 12px;
            border: 1px solid #1e293b;
            position: relative;
        }

        .product-img {
            width: 100%;
            height: 150px;
            background: #fff;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 10px;
        }

        .product-img i { font-size: 50px; color: #cbd5e1; }

        .rating {
            color: var(--primary-gold);
            font-size: 10px;
            margin-bottom: 5px;
        }

        .rating span { color: var(--text-gray); margin-left: 5px; }

        .p-name {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 10px;
            display: block;
        }

        .p-price-label { font-size: 11px; color: var(--text-gray); }

        .price-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 5px;
        }

        .current-price {
            font-size: 16px;
            font-weight: 700;
            color: var(--primary-gold);
        }

        .old-price {
            font-size: 11px;
            text-decoration: line-through;
            color: var(--text-gray);
            display: block;
        }

        .discount-badge {
            position: absolute;
            bottom: 80px;
            right: 12px;
            background: #ef4444;
            color: white;
            font-size: 10px;
            font-weight: bold;
            padding: 8px 5px;
            border-radius: 50%;
            text-align: center;
            line-height: 1;
        }

        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 5px;
            margin-top: 15px;
        }

        .btn {
            border: none;
            padding: 8px 2px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-white { background: #fff; color: #000; }
        .btn-gray { background: #334155; color: #fff; }

    </style>
</head>
<body>

    <header>
        <div class="logo-area">
            <div class="logo-icon">TF</div>
            <div class="logo-text">
                <h1>Trendy</h1>
                <p>Fashion BD</p>
            </div>
        </div>
        <div class="header-icons">
            <i class="fas fa-search icon-btn"></i>
            <div class="icon-btn">
                <i class="far fa-bell"></i>
                <span class="badge">1</span>
            </div>
            <div class="user-avatar">
                <i class="fas fa-user"></i>
            </div>
        </div>
    </header>

    <div class="categories">
        <div class="cat-item">
            <div class="cat-circle"><i class="fas fa-user-tie"></i></div>
            <span>Men's Wear</span>
        </div>
        <div class="cat-item">
            <div class="cat-circle"><i class="fas fa-shoe-prints" style="transform: rotate(-45deg);"></i></div>
            <span>Women's Fashion</span>
        </div>
        <div class="cat-item">
            <div class="cat-circle"><i class="fas fa-socks"></i></div>
            <span>Shoes</span>
        </div>
        <div class="cat-item">
            <div class="cat-circle"><i class="fas fa-shopping-bag"></i></div>
            <span>Bags</span>
        </div>
    </div>

    <div class="banner">
        <div style="color: white; text-align: center;">
            <i class="fas fa-users" style="font-size: 80px; opacity: 0.3;"></i>
            <p style="font-weight: bold;">New Collection 2024</p>
        </div>
    </div>

    <h2 class="section-title">Our Products</h2>

    <div class="product-grid">
        
        <div class="product-card">
            <div class="product-img"><i class="fas fa-shirt"></i></div>
            <div class="rating">
                <i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i>
                <span>112 reviews</span>
            </div>
            <span class="p-name">Slim Fit Shirt</span>
            <p class="p-p-price-label">Discount Price</p>
            <div class="price-row">
                <span class="current-price">TK. 1,199</span>
            </div>
            <span class="old-price">Price TK. 2,499</span>
            <div class="discount-badge">52%<br>OFF</div>
            <div class="btn-group">
                <button class="btn btn-white">Add to Cart</button>
                <button class="btn btn-gray">View Details</button>
            </div>
        </div>

        <div class="product-card">
            <div class="product-img"><i class="fas fa-shoe-prints"></i></div>
            <div class="rating">
                <i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i>
                <span>112 reviews</span>
            </div>
            <span class="p-name">Casual Shoes</span>
            <p class="p-p-price-label">Discount Price</p>
            <div class="price-row">
                <span class="current-price">TK. 1,199</span>
            </div>
            <span class="old-price">Price TK. 2,499</span>
            <div class="discount-badge">52%<br>OFF</div>
            <div class="btn-group">
                <button class="btn btn-white">Add to Cart</button>
                <button class="btn btn-gray">View Details</button>
            </div>
        </div>

    </div>

</body>
</html>
