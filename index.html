<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ghorer Bazar UI</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f5f5f5;
}

/* Header */
.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px;
    background: #fff;
}

.logo {
    font-weight: bold;
    color: #ff7a00;
}

.cart {
    position: relative;
}

.cart span {
    position: absolute;
    top: -5px;
    right: -10px;
    background: orange;
    color: white;
    font-size: 12px;
    padding: 2px 6px;
    border-radius: 50%;
}

/* Banner */
.banner {
    margin: 10px;
    background: #f6c200;
    border-radius: 10px;
    padding: 20px;
    text-align: center;
}

.banner img {
    width: 100%;
    max-height: 150px;
    object-fit: contain;
}

/* Categories */
.section {
    padding: 10px;
}

.section h3 {
    margin-bottom: 10px;
}

.categories {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
}

.category {
    background: #fff;
    padding: 15px;
    border-radius: 10px;
    text-align: center;
}

/* Products */
.products {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
}

.product {
    background: #fff;
    padding: 10px;
    border-radius: 10px;
    text-align: center;
}

.product img {
    width: 100%;
    height: 120px;
    object-fit: contain;
}

.price {
    color: orange;
    font-weight: bold;
}

.old-price {
    text-decoration: line-through;
    color: gray;
    font-size: 14px;
}

/* Bottom Nav */
.navbar {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: orange;
    display: flex;
    justify-content: space-around;
    padding: 10px 0;
    color: white;
}

.navbar div {
    text-align: center;
    font-size: 12px;
}
</style>

</head>
<body>

<!-- Header -->
<div class="header">
    <div>☰</div>
    <div class="logo">GHORER BAZAR</div>
    <div class="cart">🛒<span>3</span></div>
</div>

<!-- Banner -->
<div class="banner">
    <img src="https://i.ibb.co/6bQ6Z2k/honey.png" alt="banner">
</div>

<!-- Categories -->
<div class="section">
    <h3>Featured Categories</h3>
    <div class="categories">
        <div class="category">Oil & Ghee</div>
        <div class="category">Organic</div>
        <div class="category">Honey</div>
        <div class="category">Dates</div>
    </div>
</div>

<!-- Products -->
<div class="section">
    <h3>Top Selling Products</h3>
    <div class="products">

        <div class="product">
            <img src="https://i.ibb.co/ZYW3VTp/oil.png">
            <p>Deshi Mustard Oil 5 liter</p>
            <div class="price">৳1,470</div>
            <div class="old-price">৳1,550</div>
        </div>

        <div class="product">
            <img src="https://i.ibb.co/2kR5zqX/honey-nuts.png">
            <p>Honey Nuts 800gm</p>
            <div class="price">৳1,425</div>
            <div class="old-price">৳1,500</div>
        </div>

    </div>
</div>

<!-- Bottom Navbar -->
<div class="navbar">
    <div>🏠<br>Home</div>
    <div>📂<br>Menu</div>
    <div>🛒<br>Cart</div>
    <div>🔍<br>Search</div>
    <div>👤<br>Account</div>
</div>

</body>
</html>
