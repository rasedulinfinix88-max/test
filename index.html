<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ghorer Bazar UI</title><style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f5f5f5;
}

/* Header */
.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px;
    background: #fff;
}

.logo {
    font-weight: bold;
    color: #ff7a00;
}

.cart {
    position: relative;
}

.cart span {
    position: absolute;
    top: -5px;
    right: -10px;
    background: orange;
    color: white;
    font-size: 12px;
    padding: 2px 6px;
    border-radius: 50%;
}

/* Banner */
.banner {
    margin: 10px;
    background: #f6c200;
    border-radius: 15px;
    padding: 10px;
}

.banner img {
    width: 100%;
    height: 160px;
    object-fit: cover;
    border-radius: 10px;
}

/* Section */
.section {
    padding: 10px;
}

.section h3 {
    margin-bottom: 10px;
}

/* Products */
.products {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
}

.product {
    background: #fff;
    padding: 12px;
    border-radius: 15px;
    text-align: left;
}

.product img {
    width: 100%;
    height: 160px;
    object-fit: cover;
    border-radius: 10px;
}

.product p {
    margin: 10px 0 5px;
    font-weight: 500;
}

.price {
    color: orange;
    font-weight: bold;
    font-size: 18px;
}

.old-price {
    text-decoration: line-through;
    color: gray;
    font-size: 14px;
}

.price-row {
    display: flex;
    align-items: center;
    gap: 8px;
}

.add-btn {
    margin-top: 10px;
    background: orange;
    color: white;
    border: none;
    padding: 8px;
    width: 100%;
    border-radius: 8px;
    font-size: 14px;
}

/* Bottom Nav */
.navbar {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: orange;
    display: flex;
    justify-content: space-around;
    padding: 10px 0;
    color: white;
}

.navbar div {
    text-align: center;
    font-size: 12px;
}
</style></head>
<body><!-- Header --><div class="header">
    <div>☰</div>
    <div class="logo">GHORER BAZAR</div>
    <div class="cart">🛒<span>3</span></div>
</div><!-- Banner with real dummy image --><div class="banner">
    <img src="https://images.unsplash.com/photo-1607082348824-0a96f2a4b9da" alt="banner">
</div><!-- Products --><div class="section">
    <h3>Top Selling Products</h3>
    <div class="products"><div class="product">
        <img src="https://images.unsplash.com/photo-1615486363192-7d7d4b6c2d34">
        <p>Deshi Mustard Oil 5 liter</p>
        <div class="price-row">
            <div class="price">৳1,470</div>
            <div class="old-price">৳1,550</div>
        </div>
        <button class="add-btn">Add to Cart</button>
    </div>

    <div class="product">
        <img src="https://images.unsplash.com/photo-1604908176997-4317c3b1d87d">
        <p>Honey Nuts 800gm</p>
        <div class="price-row">
            <div class="price">৳1,425</div>
            <div class="old-price">৳1,500</div>
        </div>
        <button class="add-btn">Add to Cart</button>
    </div>

</div>

</div><!-- Bottom Navbar --><div class="navbar">
    <div>🏠<br>Home</div>
    <div>📂<br>Menu</div>
    <div>🛒<br>Cart</div>
    <div>🔍<br>Search</div>
    <div>👤<br>Account</div>
</div></body>
</html>
