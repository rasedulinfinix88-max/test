<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-Commerce Landing Page</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:Arial, sans-serif;}
    body{background:#f5f5f5;color:#333;}
    header{display:flex;justify-content:space-between;align-items:center;padding:15px 30px;background:#111;color:#fff;}
    header h1{font-size:22px;}
    nav a{color:#fff;margin-left:15px;text-decoration:none;font-size:14px;}.hero{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;height:80vh;background:linear-gradient(135deg,#111,#444);color:#fff;padding:20px;}
.hero h2{font-size:36px;margin-bottom:10px;}
.hero p{font-size:16px;margin-bottom:20px;}
.hero button{padding:12px 25px;border:none;background:#ff4d4d;color:#fff;font-size:16px;border-radius:5px;cursor:pointer;}

.products{padding:40px 20px;}
.products h2{text-align:center;margin-bottom:20px;}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px;}

.card{background:#fff;padding:15px;border-radius:10px;box-shadow:0 5px 15px rgba(0,0,0,0.1);text-align:center;}
.card img{width:100%;border-radius:10px;}
.card h3{margin:10px 0;font-size:18px;}
.card p{font-size:14px;color:#777;}
.card button{margin-top:10px;padding:10px 20px;border:none;background:#111;color:#fff;border-radius:5px;cursor:pointer;}

footer{background:#111;color:#fff;text-align:center;padding:15px;margin-top:30px;}

@media(max-width:600px){
  .hero h2{font-size:26px;}
}

  </style>
</head>
<body><header>
  <h1>MyShop</h1>
  <nav>
    <a href="#">Home</a>
    <a href="#">Products</a>
    <a href="#">Cart</a>
    <a href="#">Login</a>
  </nav>
</header><section class="hero">
  <h2>Best Products Online</h2>
  <p>Shop the latest trends at unbeatable prices</p>
  <button>Shop Now</button>
</section><section class="products">
  <h2>Featured Products</h2>
  <div class="grid"><div class="card">
  <img src="https://via.placeholder.com/200" alt="product">
  <h3>Product 1</h3>
  <p>$25.00</p>
  <button>Add to Cart</button>
</div>

<div class="card">
  <img src="https://via.placeholder.com/200" alt="product">
  <h3>Product 2</h3>
  <p>$40.00</p>
  <button>Add to Cart</button>
</div>

<div class="card">
  <img src="https://via.placeholder.com/200" alt="product">
  <h3>Product 3</h3>
  <p>$30.00</p>
  <button>Add to Cart</button>
</div>

<div class="card">
  <img src="https://via.placeholder.com/200" alt="product">
  <h3>Product 4</h3>
  <p>$55.00</p>
  <button>Add to Cart</button>
</div>

  </div>
</section><footer>
  <p>© 2026 MyShop. All rights reserved.</p>
</footer></body>
</html>
