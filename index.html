<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopX | Premium Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #6366f1;
            --accent: #ff8e3c;
            --dark: #0f172a;
            --bg: #f8fafc;
            --card-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--dark);
        }

        /* Header UI */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 5%;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            color: var(--dark);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo span { color: var(--primary); }

        nav ul {
            display: flex;
            list-style: none;
            gap: 25px;
        }

        nav ul li a {
            text-decoration: none;
            color: #64748b;
            font-weight: 600;
            font-size: 14px;
        }

        nav ul li a.active {
            color: var(--primary);
            position: relative;
        }

        nav ul li a.active::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 100%;
            height: 2px;
            background: var(--primary);
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .login-btn {
            background: #f1f5f9;
            padding: 8px 18px;
            border-radius: 20px;
            border: none;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Hero Banner (The Exact Look) */
        .hero-section {
            padding: 20px 5%;
        }

        .banner {
            background: linear-gradient(135deg, #f0f4ff 0%, #e0e7ff 100%);
            border-radius: 32px;
            padding: 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            overflow: hidden;
            box-shadow: var(--card-shadow);
        }

        .banner::before {
            content: '';
            position: absolute;
            top: -100px;
            right: -100px;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(99,102,241,0.1) 0%, transparent 70%);
            border-radius: 50%;
        }

        .banner-content h2 {
            font-size: 42px;
            font-weight: 800;
            line-height: 1.2;
            margin-bottom: 10px;
        }

        .banner-content h1 {
            font-size: 64px;
            font-weight: 800;
            color: var(--accent);
            margin-bottom: 25px;
        }

        .shop-btn {
            background: var(--primary);
            color: white;
            padding: 14px 32px;
            border-radius: 16px;
            text-decoration: none;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3);
            transition: 0.3s;
        }

        .hero-img-placeholder {
            width: 350px;
            height: 250px;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(5px);
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Categories */
        .categories {
            padding: 40px 5%;
            display: flex;
            gap: 20px;
            overflow-x: auto;
            scrollbar-width: none;
        }

        .cat-card {
            min-width: 100px;
            text-align: center;
        }

        .cat-icon {
            width: 80px;
            height: 80px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 12px;
            font-size: 28px;
            color: var(--primary);
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: 0.3s;
        }

        .cat-card:hover .cat-icon {
            background: var(--primary);
            color: white;
            transform: translateY(-5px);
        }

        /* Product Grid */
        .product-grid {
            padding: 20px 5%;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 30px;
        }

        .product-card {
            background: white;
            border-radius: 28px;
            padding: 24px;
            box-shadow: var(--card-shadow);
            border: 1px solid #f1f5f9;
            transition: 0.3s ease;
        }

        .product-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
        }

        .product-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 20px;
        }

        .product-img {
            width: 100%;
            height: 200px;
            background: #f8fafc;
            border-radius: 20px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            color: #cbd5e1;
        }

        .price-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .price {
            font-size: 24px;
            font-weight: 800;
        }

        .add-btn {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 14px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .add-btn.blue { background: #0ea5e9; }

        /* Footer */
        footer {
            padding: 40px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid #e2e8f0;
            margin-top: 40px;
        }

        .f-links a {
            margin-right: 25px;
            text-decoration: none;
            color: #64748b;
            font-weight: 600;
        }

        .social {
            display: flex;
            gap: 15px;
        }

        .social i {
            width: 40px;
            height: 40px;
            background: #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            color: var(--primary);
        }

    </style>
</head>
