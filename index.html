<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RASESHOP</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins', sans-serif;
}

body{
  background:#f5f5f5;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px;
  background:#fff;
}

.header h2{
  color:#8B0000;
  letter-spacing:2px;
  font-weight:600;
}

.menu-icon{
  font-size:28px; /* bigger menu */
  cursor:pointer;
}

/* BANNER */
.banner{
  margin:10px;
  background:#f8f8f8; /* off-white banner background */
  border-radius:12px;
  overflow:hidden;
}

.banner img{
  width:100%;
  height:120px;
  object-fit:cover;
}

/* CATEGORY */
.categories{
  display:flex;
  justify-content:flex-start; /* icons together horizontally */
  gap:15px;
  overflow-x:auto;
  padding:10px;
  background:#f8f8f8; /* off-white category background */
}

.cat{
  text-align:center;
  flex-shrink:0;
  background:#f8f8f8; /* off-white card bg */
  padding:5px 10px;
  border-radius:12px;
  border:2px solid #8B0000;
  display:flex;
  align-items:center;
  gap:8px;
}

.cat div{
  font-size:22px;
}

.cat p{
  font-size:13px;
  color:#8B0000;
}

/* PRODUCTS */
.products{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  padding:10px;
}

.card{
  background:#f8f8f8; /* off-white product bg */
  border-radius:15px;
  padding:10px;
  position:relative;
  display:flex;
  flex-direction:column;
}

/* SAVE CIRCLE */
.save-circle{
  position:absolute;
  top:5px;
  right:5px;
  background:#fff;
  color:#8B0000;
  border:2px solid #8B0000;
  width:38px;
  height:38px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:11px;
  font-weight:bold;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

/* IMAGE */
.card img{
  width:100%;
  height:150px;
  object-fit:cover;
  border-radius:10px;
}

/* TEXT */
.title{
  font-size:14px;
  margin:8px 0;
  color:#333;
}

.price{
  font-weight:bold;
  color:#8B0000;
}

.old{
  text-decoration:line-through;
  color:gray;
  font-size:12px;
}

/* BUTTON */
.btn{
  margin-top:auto;
  width:100%;
  padding:10px;
  border:2px solid #8B0000;
  background:#fff;
  color:#8B0000;
  border-radius:10px;
  font-weight:600;
}

/* FOOTER */
.footer{
  position:fixed;
  bottom:0;
  width:100%;
  background:#fff;
  display:flex;
  justify-content:space-around;
  padding:10px 0;
  box-shadow:0 -2px 5px rgba(0,0,0,0.1);
}

.footer div{
  text-align:center;
  font-size:12px;
  color:#8B0000;
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="menu-icon">☰</div>
  <h2>RASESHOP</h2>
  <div>🛒</div>
</div>

<!-- SMALL BANNER -->
<div class="banner">
  <img src="https://images.unsplash.com/photo-1607083206968-13611e3d76db">
</div>

<!-- CATEGORY -->
<div class="categories">
  <div class="cat">
    <div>👕</div>
    <p>Men's Wear</p>
  </div>
  <div class="cat">
    <div>👟</div>
    <p>Shoes</p>
  </div>
  <div class="cat">
    <div>🧦</div>
    <p>Socks</p>
  </div>
  <div class="cat">
    <div>👜</div>
    <p>Bags</p>
  </div>
  <div class="cat">
    <div>⌚</div>
    <p>Watches</p>
  </div>
</div>

<!-- PRODUCTS -->
<div class="products">

  <div class="card">
    <div class="save-circle">-300</div>
    <img src="https://images.unsplash.com/photo-1587049352846-4a222e784d38">
    <div class="title">Sundarban Honey 1kg</div>
    <div class="price">৳2,200 <span class="old">৳2,500</span></div>
    <button class="btn">Add To Cart</button>
  </div>

  <div class="card">
    <div class="save-circle">-90</div>
    <img src="https://images.unsplash.com/photo-1627308595229-7830a5c91f9f">
    <div class="title">Gawa Ghee 1kg</div>
    <div class="price">৳1,710 <span class="old">৳1,800</span></div>
    <button class="btn">Add To Cart</button>
  </div>

  <div class="card">
    <div class="save-circle">-200</div>
    <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30">
    <div class="title">Smart Watch</div>
    <div class="price">৳800 <span class="old">৳1000</span></div>
    <button class="btn">Add To Cart</button>
  </div>

  <div class="card">
    <div class="save-circle">-150</div>
    <img src="https://images.unsplash.com/photo-1512496015851-a90fb38ba796">
    <div class="title">Headphone</div>
    <div class="price">৳650 <span class="old">৳800</span></div>
    <button class="btn">Add To Cart</button>
  </div>

</div>

<!-- FOOTER -->
<div class="footer">
  <div>🏠<br>Shop</div>
  <div>🔍<br>Search</div>
  <div>🛒<br>Cart</div>
  <div>👤<br>Profile</div>
</div>

</body>
</html>
