<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopX Clone</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #6366f1;
            --text-dark: #1e224f;
            --discount-red: #ff7070;
            --bg-light: #f9faff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: white;
            padding-bottom: 50px;
        }

        /* Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: #fff;
        }

        .logo {
            display: flex;
            align-items: center;
            font-size: 22px;
            font-weight: 800;
            color: #2D3277;
            gap: 8px;
        }

        .logo i {
            color: #6366f1;
            font-size: 24px;
        }

        .search-container {
            flex-grow: 1;
            margin: 0 20px;
            position: relative;
        }

        .search-container input {
            width: 100%;
            padding: 10px 15px 10px 40px;
            border-radius: 25px;
            border: none;
            background: #f1f3f9;
            font-size: 14px;
        }

        .search-container i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
        }

        .cart-box {
            position: relative;
            font-size: 22px;
        }

        .cart-badge {
            position: absolute;
            top: -5px;
            right: -8px;
            background: #f97316;
            color: white;
            font-size: 10px;
            padding: 2px 5px;
            border-radius: 50%;
            font-weight: bold;
        }

        /* Hero Banner */
        .banner-wrapper {
            padding: 0 15px;
            margin-top: 10px;
        }

        .hero-banner {
            background: linear-gradient(135deg, #eef2ff 0%, #e0e7ff 100%);
            border-radius: 40px;
            padding: 50px 20px;
            text-align: center;
            position: relative;
        }

        .hero-banner h1 {
            font-size: 42px;
            font-weight: 800;
            color: var(--text-dark);
            line-height: 1.1;
            margin-bottom: 10px;
        }

        .hero-banner .promo-text {
            font-size: 48px;
            font-weight: 700;
            color: var(--discount-red);
            margin-bottom: 25px;
        }

        .shop-now-btn {
            background: #6366f1;
            color: white;
            padding: 14px 35px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.4);
        }

        /* Categories */
        .categories {
            display: flex;
            padding: 30px 15px;
            gap: 25px;
            overflow-x: auto;
            scrollbar-width: none;
        }

        .cat-item {
            text-align: center;
            min-width: 80px;
        }

        .cat-icon {
            width: 70px;
            height: 70px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 15px rgba(0,0,0,0.05);
            margin: 0 auto 10px;
            color: #6366f1;
            font-size: 24px;
        }

        .cat-item p {
            font-size: 13px;
            font-weight: 500;
            color: #555;
        }

        /* Product Section */
        .product-container {
            padding: 10px 20px;
        }

        .product-card {
            background: white;
            border-radius: 25px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
            border: 1px solid #f0f0f0;
            margin-bottom: 20px;
        }

        .product-card h3 {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 15px;
        }

        .product-img-box {
            width: 100%;
            height: 180px;
            background: #f8fafc;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
        }

        .product-img-box i {
            font-size: 60px;
            color: #d1d5db;
        }

        .add-cart-btn {
            width: 100%;
            background: #6366f1;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 12px;
            font-weight: 600;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }

        /* Bottom Nav (About Us, etc) */
        footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            border-top: 1px solid #eee;
            margin-top: 20px;
        }

        .footer-links {
            display: flex;
            gap: 15px;
            font-size: 14px;
            font-weight: 600;
            color: #444;
        }

        .social-icons {
            display: flex;
            gap: 12px;
        }

        .social-icons i {
            font-size: 20px;
            color: #6366f1;
        }

    </style>
</head>
<body>

    <header>
        <div class="logo">
            <i class="fas fa-shopping-bag"></i> ShopX
        </div>
        <div class="search-container">
            <i class="fas fa-search"></i>
            <input type="text" placeholder="Search products...">
        </div>
        <div class="cart-box">
            <i class="fas fa-shopping-cart"></i>
            <span class="cart-badge">3</span>
        </div>
    </header>

    <div class="banner-wrapper">
        <section class="hero-banner">
            <h1>Super<br>Deals!</h1>
            <div class="promo-text">Up to 50% Off</div>
            <a href="#" class="shop-now-btn">Shop Now <i class="fas fa-arrow-right"></i></a>
        </section>
    </div>

    <section class="categories">
        <div class="cat-item">
            <div class="cat-icon"><i class="fas fa-mobile-alt"></i></div>
            <p>Phones</p>
        </div>
        <div class="cat-item">
            <div class="cat-icon"><i class="fas fa-headphones"></i></div>
            <p>Headphones</p>
        </div>
        <div class="cat-item">
            <div class="cat-icon"><i class="fas fa-clock"></i></div>
            <p>Watches</p>
        </div>
        <div class="cat-item">
            <div class="cat-icon"><i class="fas fa-tshirt"></i></div>
            <p>Fashion</p>
        </div>
    </section>

    <div class="product-container">
        <div class="product-card">
            <h3>Smartphone Pro</h3>
            <div class="product-img-box">
                <i class="fas fa-mobile-screen-button"></i>
            </div>
            <button class="add-cart-btn">Add to Cart <i class="fas fa-chevron-right"></i></button>
        </div>

        <div class="product-card">
            <h3>Smart Watch</h3>
            <div class="product-img-box">
                <i class="fas fa-stopwatch"></i>
            </div>
            <button class="add-cart-btn">Add to Cart <i class="fas fa-chevron-right"></i></button>
        </div>
    </div>

    <footer>
        <div class="footer-links">
            <span>About Us</span>
            <span>Contact</span>
            <span>Support</span>
        </div>
        <div class="social-icons">
            <i class="fab fa-facebook"></i>
            <i class="fab fa-twitter"></i>
            <i class="fab fa-instagram"></i>
        </div>
    </footer>

</body>
</html>
