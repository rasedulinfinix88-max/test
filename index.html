<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trendy Fashion BD | Light Mode</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg: #ffffff;
            --card-bg: #f8fafc;
            --header-bg: #ffffff;
            --gold: #fcc419;
            --text-main: #1e293b;
            --text-dim: #64748b;
            --nav-bg: #ffffff;
            --border-color: #e2e8f0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg); color: var(--text-main); padding-bottom: 80px; }

        /* --- Header --- */
        header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 15px 20px; background: var(--header-bg); position: sticky; top: 0; z-index: 1000;
            border-bottom: 1px solid var(--border-color);
        }
        .logo-box { display: flex; align-items: center; gap: 10px; }
        .logo-icon { color: #000; font-size: 32px; font-weight: 800; }
        .logo-text h1 { font-size: 18px; font-weight: 700; line-height: 1; color: #000; }
        .logo-text p { font-size: 11px; color: var(--text-dim); text-transform: uppercase; }
        .header-icons { display: flex; gap: 15px; font-size: 20px; color: #000; }

        /* --- Categories --- */
        .cat-section { display: flex; justify-content: space-around; padding: 25px 0; background: #fff; }
        .cat-item { text-align: center; }
        .cat-circle { 
            width: 65px; height: 65px; background: #f1f5f9; border-radius: 50%; 
            border: 2px solid var(--gold); display: flex; align-items: center; 
            justify-content: center; margin-bottom: 8px; color: #334155; font-size: 26px;
            transition: 0.3s;
        }
        .cat-circle:hover { transform: scale(1.1); background: #fff; }
        .cat-item span { font-size: 11px; font-weight: 700; color: var(--text-dim); }

        /* --- Products --- */
        .section-title { padding: 10px 20px 15px; font-size: 20px; font-weight: 800; color: #000; }
        .product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 0 15px; }
        .p-card { 
            background: var(--card-bg); border-radius: 20px; padding: 12px; 
            border: 1px solid var(--border-color); position: relative;
            transition: 0.3s;
        }
        .p-card:hover { box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .p-img-box { 
            width: 100%; height: 130px; background: #fff; border-radius: 15px; 
            margin-bottom: 12px; display: flex; align-items: center; justify-content: center; 
            color: #cbd5e1; font-size: 50px;
        }
        .rating { color: var(--gold); font-size: 10px; margin-bottom: 5px; }
        .p-name { font-size: 14px; font-weight: 700; margin-bottom: 4px; display: block; color: #000; }
        .price-label { font-size: 11px; color: var(--text-dim); }
        .price-now { font-size: 16px; font-weight: 800; color: #2563eb; margin: 2px 0; display: block; }
        .price-old { font-size: 11px; color: var(--text-dim); text-decoration: line-through; }
        
        .discount-badge { 
            position: absolute; top: 120px; right: 10px; background: #ef4444; 
            color: white; font-size: 9px; font-weight: 800; width: 35px; height: 35px; 
            border-radius: 50%; display: flex; align-items: center; justify-content: center; 
            text-align: center; line-height: 1; border: 2px solid #fff;
        }

        .p-btns { display: flex; gap: 6px; margin-top: 15px; }
        .btn { flex: 1; border: none; padding: 8px 0; border-radius: 8px; font-size: 10px; font-weight: 700; cursor: pointer; }
        .btn-cart { background: #000; color: #fff; }
        .btn-view { background: #e2e8f0; color: #475569; }

        /* --- Fixed Footer Nav --- */
        .fixed-nav {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: var(--nav-bg); backdrop-filter: blur(10px);
            display: flex; justify-content: space-around; padding: 12px 0;
            border-top: 1px solid var(--border-color); z-index: 2000;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.03);
        }
        .nav-link { text-align: center; color: var(--text-dim); text-decoration: none; flex: 1; position: relative; }
        .nav-link i { font-size: 20px; display: block; margin-bottom: 4px; }
        .nav-link span { font-size: 10px; font-weight: 700; text-transform: uppercase; }
        .nav-link.active { color: #000; }
        .cart-count { 
            position: absolute; top: -5px; right: 28%; background: #ef4444; color: #fff; 
            font-size: 9px; width: 16px; height: 16px; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; font-weight: 800;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-box">
            <div class="logo-icon">TF</div>
            <div class="logo-text">
                <h1RASEDUL</h1>
                <p>SHOP</p>
            </div>
        </div>
        <div class="header-icons">
            <i class="fas fa-search"></i>
            <i class="far fa-bell"></i>
        </div>
    </header>

    <section class="cat-section">
        <div class="cat-item"><div class="cat-circle"><i class="fas fa-tshirt"></i></div><span>Men's Wear</span></div>
        <div class="cat-item"><div class="cat-circle"><i class="fas fa-shoe-prints"></i></div><span>Shoes</span></div>
        <div class="cat-item"><div class="cat-circle"><i class="fas fa-socks"></i></div><span>Socks</span></div>
        <div class="cat-item"><div class="cat-circle"><i class="fas fa-shopping-bag"></i></div><span>Bags</span></div>
    </section>

    <h2 class="section-title">Our Products</h2>
    <div class="product-grid">
        <div class="p-card">
            <div class="p-img-box"><i class="fas fa-shirt"></i></div>
            <div class="rating"><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i> <span>112 reviews</span></div>
            <span class="p-name">Premium Slim Shirt</span>
            <span class="price-label">Discount Price</span>
            <span class="price-now">TK. 1,199</span>
            <span class="price-old">Price TK. 2,499</span>
            <div class="discount-badge">52%<br>OFF</div>
            <div class="p-btns">
                <button class="btn btn-cart">Add to Cart</button>
                <button class="btn btn-view">Details</button>
            </div>
        </div>

        <div class="p-card">
            <div class="p-img-box"><i class="fas fa-shoe-prints"></i></div>
            <div class="rating"><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i> <span>85 reviews</span></div>
            <span class="p-name">Casual Sneakers</span>
            <span class="price-label">Discount Price</span>
            <span class="price-now">TK. 1,599</span>
            <span class="price-old">Price TK. 3,200</span>
            <div class="discount-badge">50%<br>OFF</div>
            <div class="p-btns">
                <button class="btn btn-cart">Add to Cart</button>
                <button class="btn btn-view">Details</button>
            </div>
        </div>
    </div>

    <nav class="fixed-nav">
        <a href="#" class="nav-link active">
            <i class="fas fa-store"></i>
            <span>Shop</span>
        </a>
        <a href="#" class="nav-link">
            <i class="fas fa-shopping-cart"></i>
            <span class="cart-count">2</span>
            <span>Cart</span>
        </a>
        <a href="#" class="nav-link">
            <i class="fas fa-comment-dots"></i>
            <span>Message</span>
        </a>
        <a href="#" class="nav-link">
            <i class="fas fa-user"></i>
            <span>Profile</span>
        </a>
    </nav>

</body>
</html>
